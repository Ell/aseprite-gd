name: release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            lib: libaseprite_gd.so
          - os: windows-latest
            lib: aseprite_gd.dll
          - os: macos-latest
            lib: libaseprite_gd.dylib
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            rustup target add aarch64-apple-darwin x86_64-apple-darwin
            cargo build -p aseprite-gd --release --target aarch64-apple-darwin
            cargo build -p aseprite-gd --release --target x86_64-apple-darwin
            mkdir -p target/release
            lipo -create -output "target/release/${{ matrix.lib }}" \
              "target/aarch64-apple-darwin/release/${{ matrix.lib }}" \
              "target/x86_64-apple-darwin/release/${{ matrix.lib }}"
          else
            cargo build -p aseprite-gd --release
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: lib-${{ runner.os }}
          path: target/release/${{ matrix.lib }}
          if-no-files-found: error

  package:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: libs
          merge-multiple: true
      - name: assemble addon
        run: |
          DEST=dist/addons/aseprite_gd
          mkdir -p "$DEST/bin"
          cp godot/addons/aseprite_gd/plugin.cfg godot/addons/aseprite_gd/plugin.gd "$DEST/"
          cp godot/addons/aseprite_gd/import_section.gd godot/addons/aseprite_gd/inspector_plugin.gd godot/addons/aseprite_gd/preview_generator.gd "$DEST/"
          mkdir -p "$DEST/aseprite_scripts"
          cp tools/aseprite/name_tiles.lua "$DEST/aseprite_scripts/"
          cp libs/* "$DEST/bin/"
          cp LICENSE README.md "$DEST/"
          # Distribution .gdextension: libraries live inside the addon.
          cat > "$DEST/aseprite_gd.gdextension" <<'GDEXT'
          [configuration]
          entry_symbol = "gdext_rust_init"
          compatibility_minimum = 4.2

          [libraries]
          linux.x86_64 = "res://addons/aseprite_gd/bin/libaseprite_gd.so"
          windows.x86_64 = "res://addons/aseprite_gd/bin/aseprite_gd.dll"
          macos = "res://addons/aseprite_gd/bin/libaseprite_gd.dylib"
          GDEXT
          sed -i 's/^          //' "$DEST/aseprite_gd.gdextension"
          cd dist && zip -r "../aseprite-gd-${GITHUB_REF_NAME}.zip" addons
      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "aseprite-gd-${GITHUB_REF_NAME}.zip" \
            --title "$GITHUB_REF_NAME" --generate-notes

  # The Godot Asset Library installs from a git archive, not release assets,
  # so a dedicated branch carries the built addon tree (binaries included).
  assetlib-branch:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: libs
          merge-multiple: true
      - name: assemble and push assetlib branch
        run: |
          DEST=assetlib-tree/addons/aseprite_gd
          mkdir -p "$DEST/bin"
          cp godot/addons/aseprite_gd/plugin.cfg godot/addons/aseprite_gd/plugin.gd "$DEST/"
          cp godot/addons/aseprite_gd/import_section.gd godot/addons/aseprite_gd/inspector_plugin.gd godot/addons/aseprite_gd/preview_generator.gd "$DEST/"
          mkdir -p "$DEST/aseprite_scripts"
          cp tools/aseprite/name_tiles.lua "$DEST/aseprite_scripts/"
          cp libs/* "$DEST/bin/"
          cp LICENSE README.md "$DEST/"
          cat > "$DEST/aseprite_gd.gdextension" <<'GDEXT'
          [configuration]
          entry_symbol = "gdext_rust_init"
          compatibility_minimum = 4.2

          [libraries]
          linux.x86_64 = "res://addons/aseprite_gd/bin/libaseprite_gd.so"
          windows.x86_64 = "res://addons/aseprite_gd/bin/aseprite_gd.dll"
          macos = "res://addons/aseprite_gd/bin/libaseprite_gd.dylib"
          GDEXT
          sed -i 's/^          //' "$DEST/aseprite_gd.gdextension"
          cp LICENSE assetlib-tree/LICENSE
          cp README.md assetlib-tree/README.md

          git config user.name "$(git log -1 --format=%an)"
          git config user.email "$(git log -1 --format=%ae)"
          git switch --orphan assetlib
          find . -maxdepth 1 ! -name . ! -name .git ! -name assetlib-tree -exec rm -rf {} +
          mv assetlib-tree/* .
          rmdir assetlib-tree
          git add -A
          git commit -m "assetlib: ${GITHUB_REF_NAME}"
          git push -f origin assetlib

  # Optional: file an update with the Godot Asset Library. Runs only when the
  # maintainer has configured the secrets (see docs/publishing.md); edits are
  # human-reviewed on their side before going live.
  assetlib-update:
    needs: assetlib-branch
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      ASSETLIB_USERNAME: ${{ secrets.ASSETLIB_USERNAME }}
      ASSETLIB_PASSWORD: ${{ secrets.ASSETLIB_PASSWORD }}
      ASSETLIB_ASSET_ID: ${{ secrets.ASSETLIB_ASSET_ID }}
    steps:
      - name: submit asset library edit
        run: |
          if [ -z "$ASSETLIB_USERNAME" ] || [ -z "$ASSETLIB_ASSET_ID" ]; then
            echo "asset library secrets not configured; skipping"
            exit 0
          fi
          API=https://godotengine.org/asset-library/api
          TOKEN=$(curl -fsS -X POST "$API/login"             --data-urlencode "username=$ASSETLIB_USERNAME"             --data-urlencode "password=$ASSETLIB_PASSWORD" | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')
          COMMIT=$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/assetlib | cut -f1)
          curl -fsS -X POST "$API/asset/$ASSETLIB_ASSET_ID"             --data-urlencode "token=$TOKEN"             --data-urlencode "version_string=${GITHUB_REF_NAME#v}"             --data-urlencode "download_commit=$COMMIT"             | head -c 400
          echo
          echo "edit submitted for review"
